<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Human</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #101018;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
  }

  /* --- Left: Video Area --- */
  .video-area {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .video-viewport {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 9 / 16;
    max-height: calc(100vh - 80px);
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  #idleVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #talkVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  #talkVideo.active { opacity: 1; }

  .status-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    z-index: 10;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }
  .status-badge.idle { background: rgba(76,175,80,0.25); color: #81c784; border: 1px solid rgba(76,175,80,0.4); }
  .status-badge.talking { background: rgba(33,150,243,0.25); color: #64b5f6; border: 1px solid rgba(33,150,243,0.4); }

  .unmute-overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.35);
    cursor: pointer;
    border-radius: 16px;
    transition: opacity 0.3s;
  }
  .unmute-overlay.hidden { opacity: 0; pointer-events: none; }
  .unmute-overlay span {
    padding: 12px 24px;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* --- Right: Chat Panel --- */
  .chat-panel {
    width: min(420px, 35vw);
    min-width: 300px;
    display: flex;
    flex-direction: column;
    background: #14141e;
    border-left: 1px solid #1e1e2e;
    height: 100vh;
  }

  .chat-header {
    padding: 20px 24px;
    border-bottom: 1px solid #1e1e2e;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.alice {
    align-self: flex-start;
    background: #1e1e2e;
    color: #ccc;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Dynamic option buttons */
  .options-area {
    padding: 16px 20px;
    border-top: 1px solid #1e1e2e;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    width: 100%;
    padding: 12px 18px;
    border-radius: 10px;
    border: 1px solid #2a2a3a;
    background: #1a1a28;
    color: #ddd;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .option-btn:hover {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
  }
  .option-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .options-hint {
    font-size: 12px;
    color: #555;
    text-align: center;
    padding: 4px 0;
  }

  .options-area.waiting .option-btn {
    opacity: 0.4;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Video Area -->
<div class="video-area">
  <div class="video-viewport">
    <video id="idleVideo" playsinline loop></video>
    <video id="talkVideo" playsinline></video>
    <div id="unmuteOverlay" class="unmute-overlay">
      <span>Click to start</span>
    </div>
    <div id="statusBadge" class="status-badge idle">Listening</div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel">
  <div class="chat-header">Chat with Alice</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="options-area" id="optionsArea">
    <div class="options-hint">Click the video to begin</div>
  </div>
</div>

<script>
(() => {
  // ========== DIALOGUE TREE ==========
  // Edit this object to change the conversation flow.
  // Each node: { video, message, options: [{ label, next }] }
  // Set options to [] or omit for a terminal/end node.
  const DIALOGUE_TREE = {
    start: {
      video: 'video_asset/intro.mp4',
      message: 'Hi! Let me introduce myself and tell you what I can help with.',
      options: [
        { label: '💡 Give me some advice', next: 'advice' },
        { label: '🤔 I have an idea to share', next: 'idea' },
      ]
    },
    advice: {
      video: 'video_asset/advice_1.mp4',
      message: 'Here is my advice for you!',
      options: [
        { label: '💡 I have a better idea', next: 'betterIdea' },
        { label: '❌ I don\'t think that works', next: 'reject' },
      ]
    },
    idea: {
      video: 'video_asset/betterIdea.mp4',
      message: 'I have a better idea for you!',
      options: [
        { label: '🔄 Tell me another idea', next: 'betterIdea2' },
        { label: '❌ I reject this idea', next: 'reject' },
      ]
    },
    betterIdea: {
      video: 'video_asset/betterIdea.mp4',
      message: 'How about this approach instead?',
      options: [
        { label: '🔄 Show me another option', next: 'betterIdea2' },
        { label: '❌ I reject this', next: 'reject' },
        { label: '🔁 Start over', next: 'start' },
      ]
    },
    betterIdea2: {
      video: 'video_asset/betterIdea_2.mp4',
      message: 'Actually, here\'s another thought...',
      options: [
        { label: '❌ I don\'t think so', next: 'reject' },
        { label: '🔁 Start over', next: 'start' },
      ]
    },
    reject: {
      video: 'video_asset/reject_Idea.mp4',
      message: 'I understand. Let me reconsider.',
      options: [
        { label: '💡 Give me advice instead', next: 'advice' },
        { label: '🤔 Let me share my idea', next: 'idea' },
        { label: '🔁 Start over', next: 'start' },
      ]
    },
  };

  const IDLE_SRC = 'video_asset/listening.mp4';

  // ========== STATE ==========
  let currentNode = null;
  let audioUnlocked = false;

  // ========== DOM ==========
  const idleVideo = document.getElementById('idleVideo');
  const talkVideo = document.getElementById('talkVideo');
  const statusBadge = document.getElementById('statusBadge');
  const chatMessages = document.getElementById('chatMessages');
  const optionsArea = document.getElementById('optionsArea');
  const unmuteOverlay = document.getElementById('unmuteOverlay');

  // ========== AUDIO UNLOCK ==========
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    idleVideo.muted = false;
    talkVideo.muted = false;
    unmuteOverlay.classList.add('hidden');
  }

  unmuteOverlay.addEventListener('click', () => {
    unlockAudio();
    idleVideo.play().catch(() => {});
    // Auto-start the first node
    goToNode('start');
  });

  // ========== PRELOAD ==========
  const preloaded = {};
  function preloadVideo(src) {
    if (preloaded[src]) return;
    const v = document.createElement('video');
    v.preload = 'auto';
    v.src = src;
    v.load();
    preloaded[src] = v;
  }
  // Preload all videos in the tree
  Object.values(DIALOGUE_TREE).forEach(node => {
    if (node.video) preloadVideo(node.video);
  });
  preloadVideo(IDLE_SRC);

  // ========== INIT ==========
  function init() {
    idleVideo.src = IDLE_SRC;
    idleVideo.muted = true;
    idleVideo.play().catch(() => {});
    setStatus('idle');
  }

  // ========== STATUS ==========
  function setStatus(s) {
    statusBadge.textContent = s === 'idle' ? 'Listening' : 'Speaking';
    statusBadge.className = 'status-badge ' + (s === 'idle' ? 'idle' : 'talking');
  }

  // ========== CHAT ==========
  function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // ========== OPTIONS ==========
  function showOptions(options) {
    optionsArea.innerHTML = '';
    optionsArea.classList.remove('waiting');

    if (!options || options.length === 0) {
      optionsArea.innerHTML = '<div class="options-hint">Conversation ended. Refresh to restart.</div>';
      return;
    }

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        // Show user's choice in chat
        addMessage(opt.label, 'user');
        goToNode(opt.next);
      });
      optionsArea.appendChild(btn);
    });
  }

  function disableOptions() {
    optionsArea.classList.add('waiting');
    optionsArea.innerHTML = '<div class="options-hint">Alice is speaking...</div>';
  }

  // ========== PLAY NODE ==========
  function goToNode(nodeId) {
    const node = DIALOGUE_TREE[nodeId];
    if (!node) return;

    currentNode = nodeId;
    disableOptions();
    setStatus('talking');

    // Mute idle so audio doesn't overlap
    idleVideo.muted = true;

    talkVideo.src = node.video;
    talkVideo.muted = !audioUnlocked;
    talkVideo.loop = false;

    const onReady = () => {
      talkVideo.removeEventListener('canplaythrough', onReady);
      talkVideo.play().catch(() => {});
      talkVideo.classList.add('active');

      // Show Alice's message when video starts
      addMessage(node.message, 'alice');
    };

    talkVideo.onended = () => {
      talkVideo.onended = null;
      talkVideo.classList.remove('active');

      // Unmute idle
      if (audioUnlocked) idleVideo.muted = false;
      setStatus('idle');

      // Show options for this node
      showOptions(node.options);
    };

    if (talkVideo.readyState >= 4) {
      onReady();
    } else {
      talkVideo.addEventListener('canplaythrough', onReady);
    }
    talkVideo.load();
  }

  // ========== DATA LOGGING (for Qualtrics) ==========
  // Logs the user's dialogue path. Can be sent to Qualtrics via postMessage.
  const dialoguePath = [];

  const origGoToNode = goToNode;
  goToNode = function(nodeId) {
    dialoguePath.push({ node: nodeId, timestamp: Date.now() });
    // Send to parent (Qualtrics iframe)
    try {
      window.parent.postMessage({
        type: 'digitalHumanEvent',
        node: nodeId,
        path: dialoguePath,
      }, '*');
    } catch(e) {}
    origGoToNode(nodeId);
  };

  // ========== START ==========
  init();
})();
</script>
</body>
</html>
